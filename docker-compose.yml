version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: alchemist-backend
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=5000
      - STARTING_GOLD_LIMIT=1599
      - PAYMENT_UPI_ID=7982421223@fam
      - PAYMENT_PROVIDER=MANUAL_UPI
    ports:
      - "5000:5000"
    volumes:
      - ./backend/database:/usr/src/app/database
      - ./backend/logs:/usr/src/app/logs
    networks:
      - courier-net

  frontend:
    build:
      context: ./ancient-letters
      dockerfile: Dockerfile
    container_name: alchemist-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - courier-net

  proxy:
    image: nginx:alpine
    container_name: alchemist-proxy
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - courier-net

networks:
  courier-net:
    driver: bridge
